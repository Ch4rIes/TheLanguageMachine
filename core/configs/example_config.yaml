# Example training configuration

# Data paths
train_data_path: "data/train.bin"
val_data_path: "data/val.bin"

# Training settings
batch_size: 32
max_iters: 10000
grad_clip_norm: 1.0

# Logging & Checkpointing
log_interval: 10
val_interval: 100
checkpoint_interval: 1000
checkpoint_dir: "checkpoints"

# Device: "cpu", "cuda:0", "mps" (Apple Silicon)
device: "cpu"

# Model architecture
model:
  vocab_size: 32000
  context_length: 256
  num_layers: 6
  d_model: 512
  num_heads: 8
  d_ff: 1024
  theta: 10000.0

# Optimizer (AdamW)
optimizer:
  lr: 1e-3
  betas: [0.9, 0.999]
  eps: 1e-8
  weight_decay: 0.01

# Learning rate scheduler (cosine with warmup)
scheduler:
  warmup_iters: 100
  cosine_cycle_iters: 10000
  min_lr_ratio: 0.1  # min_lr = lr * 0.1
