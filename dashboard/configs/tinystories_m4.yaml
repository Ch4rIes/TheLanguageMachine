# TinyStories — MacBook Air M4 reference config
#
# Dataset setup (run once from assignment1-basics/):
#   curl -L https://huggingface.co/datasets/roneneldan/TinyStories/resolve/main/TinyStoriesV2-GPT4-train.txt -o data/tinystories_train.txt
#   curl -L https://huggingface.co/datasets/roneneldan/TinyStories/resolve/main/TinyStoriesV2-GPT4-valid.txt -o data/tinystories_val.txt
#   python -m cs336_basics.tokenizer_cli train -i data/tinystories_train.txt -v 10000 -o tokenizers/tinystories_10k.json
#   # (or use the pre-trained tokenizers/tinystories_10k.json)
#   python dashboard/backend/scripts/encode_dataset.py \
#       --tokenizer tokenizers/tinystories_10k.json \
#       --input data/tinystories_train.txt --output data/tinystories_train.bin
#   python dashboard/backend/scripts/encode_dataset.py \
#       --tokenizer tokenizers/tinystories_10k.json \
#       --input data/tinystories_val.txt --output data/tinystories_val.bin
#
# Model: ~5M params  •  Trains in ~30 min on M4 Air

train_data_path: "data/tinystories_train.bin"
val_data_path: "data/tinystories_val.bin"

batch_size: 64
max_iters: 5000
grad_clip_norm: 1.0

log_interval: 10
val_interval: 250
checkpoint_interval: 500
checkpoint_dir: "checkpoints/tinystories_m4"

device: "mps"

model:
  vocab_size: 10000
  context_length: 256
  num_layers: 6
  d_model: 256
  num_heads: 4
  d_ff: 512
  theta: 10000.0

optimizer:
  lr: 0.001
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.01

scheduler:
  warmup_iters: 200
  cosine_cycle_iters: 5000
  min_lr_ratio: 0.1
